name: Poll referendum feed

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      baseline_only:
        description: "Aggiorna snapshot/feed senza creare eventi o inviare Telegram"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: referendum-feed-poll
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  poll:
    runs-on: ubuntu-latest
    env:
      SOURCE_URL: https://firmereferendum.giustizia.it/referendum/api-portal/iniziativa/public
      PUBLIC_BASE_URL: https://${{ github.repository_owner }}.github.io/referendum-feed
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SEND_INITIAL_EVENTS: "false"
      BASELINE_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.baseline_only || false }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Poll source
        run: bun run poll

      - name: Commit generated files
        run: |
          if git diff --quiet -- data public; then
            echo "No generated changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data public
          git commit -m "Update referendum feed"
          git push
